name: 报告BUG
description: "报告一个bug，且您确信这是bug而不是您的问题"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交 issue! 请尽可能完整填写以下信息，帮助我们更好地定位问题~

        ------
  - type: checkboxes
    attributes:
      label: 这个bug是否已存在现有issue了？
      description: 请搜索全部 issue 和 discussion 以查看您想报告的 issue 是否已存在。
      options:
      - label: 我确认没有已有 issue。
        required: true
  - type: textarea
    id: what-happened
    attributes:
      label: 错误表现
      description: 请描述您遇到的 bug。<br />
        提示：如果可以，也请提供错误的截图。
      placeholder: 发生什么事了？
    validations:
      required: true
  - type: textarea
    attributes:
      label: 复现操作
      description: 你之前干了什么，然后出现了 bug 呢？
      placeholder: |
        1. 执行步骤一
        2. 执行步骤二
        3. 执行步骤三
        4. 出现错误
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 请将终端中的主要错误报告粘贴至此处。
      render: shell
  - type: textarea
    attributes:
      label: 运行环境
      description: |
        请提供您的运行环境信息，以下是一个例子：
        - **OS**: Windows 11 22H2
        - **Browser**: Chrome
        - **Node.js version**: 20.10.0
        - **Python version**: 3.11.1
      value: |
        - OS:
        - Browser:
        - 框架/库版本:
        - 语言版本:
    validations:
      required: false
  - type: checkboxes
    attributes:
      label: 帮助解决
      description: 如果您能够并愿意协助解决该问题，向我们提交一个 pull request，那再好不过了！
      options:
        - label: 我愿意协助解决！
          required: false
  - type: textarea
    attributes:
      label: 补充说明
      description: 链接？参考资料？任何更多背景信息！
